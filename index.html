<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXVW.XYZ | Creative Development</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/maxvw.svg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,900&family=Playwrite+NZ+Guides&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            cursor: none;
            overflow-x: hidden;
            background-color: white;
        }

        .font-huge { font-family: 'Inter', sans-serif; font-weight: 900; }
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; }
        .font-mono-code { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; }
        .font-playwrite { font-family: 'Playwrite NZ Guides', cursive; }
        
        .text-huge { font-size: clamp(4rem, 15vw, 18rem); line-height: 0.85; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1px black; color: transparent; }
        .outline-text:hover { color: black; transition: 0.3s ease; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        .pause { animation-play-state: paused; }

        .selection-lake-blue ::selection {
            background: #007187;
            color: white;
        }

        /* Prevent long words from breaking layout in feature boxes on mobile */
        .hyphens-auto {
            hyphens: auto;
            word-wrap: break-word;
        }
    </style>
</head>
<body class="selection-lake-blue">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Correctly extracting icons from the global lucide object
        const GithubIcon = () => <i data-lucide="github"></i>;
        const MailIcon = () => <i data-lucide="mail"></i>;
        const ArrowRightIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        );
        const ArrowUpRightIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M7 17L17 7M17 7H7M17 7V17"/>
            </svg>
        );

        const FeatureBox = ({ number, title, desc, onEnter, onLeave }) => {
            const [isWip, setIsWip] = useState(false);

            useEffect(() => {
                // Initialize lucide icons if any are used in raw HTML
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isWip]);

            if (isWip) {
                return (
                    <div 
                        className="bg-black p-8 md:p-12 flex flex-col justify-center items-center gap-4 group cursor-none h-full min-h-[300px] md:min-h-[400px]"
                        onMouseEnter={onEnter} 
                        onMouseLeave={onLeave}
                        onClick={() => setIsWip(false)}
                    >
                        <div className="text-[#007187] font-huge text-6xl md:text-8xl tracking-tighter italic">WIP</div>
                        <div className="font-mono-code text-white text-[10px] opacity-50 uppercase text-center">
                            Work in progress.<br/>
                            (Click to dismiss)
                        </div>
                    </div>
                );
            }

            return (
                <div 
                    className="bg-white p-8 md:p-12 flex flex-col gap-6 md:gap-8 hover:bg-[#f5f5f5] transition-colors group cursor-none h-full min-h-[300px] md:min-h-[400px] border-b md:border-none border-black/10"
                    onMouseEnter={onEnter} 
                    onMouseLeave={onLeave} 
                    onClick={() => setIsWip(true)}
                >
                    <div className="text-[10px] md:text-xs font-mono opacity-40 uppercase tracking-widest">{number} / 04</div>
                    <div className="flex-grow">
                        <h3 className="text-4xl md:text-6xl font-huge mb-3 md:mb-4 group-hover:translate-x-2 group-hover:text-[#007187] transition-all tracking-tighter leading-none break-words hyphens-auto">
                            {title}
                        </h3>
                        <p className="text-lg md:text-xl max-w-sm opacity-60 leading-tight">
                            {desc}
                        </p>
                    </div>
                    <div className="mt-auto">
                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-full border border-black flex items-center justify-center group-hover:bg-[#007187] group-hover:border-[#007187] group-hover:text-white transition-all">
                            <ArrowRightIcon size={18} />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [cursorType, setCursorType] = useState('default'); 
            const [copyStatus, setCopyStatus] = useState(false);
            const cursorRef = useRef(null);
            const requestRef = useRef();

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };

                const updateCursor = () => {
                    if (cursorRef.current) {
                        cursorRef.current.style.transform = `translate3d(${mousePos.x}px, ${mousePos.y}px, 0) translate(-50%, -50%)`;
                    }
                    requestRef.current = requestAnimationFrame(updateCursor);
                };

                window.addEventListener('mousemove', handleMouseMove);
                requestRef.current = requestAnimationFrame(updateCursor);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    cancelAnimationFrame(requestRef.current);
                };
            }, [mousePos]);

            const onEnterHover = () => setCursorType('hover');
            const onEnterText = () => setCursorType('text');
            const onLeave = () => setCursorType('default');

            const handleCopyEmail = (e) => {
                e.preventDefault();
                const email = "max@maxvw.xyz";
                const textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen bg-white text-black font-sans overflow-x-hidden cursor-none">
                    {/* High-Performance Custom Cursor */}
                    <div 
                        ref={cursorRef}
                        className={`fixed pointer-events-none z-[9999] rounded-full flex items-center justify-center overflow-hidden transition-[width,height,background-color] duration-200 ease-out mix-blend-difference
                        ${cursorType === 'hover' ? 'w-24 h-24 bg-white' : 
                            cursorType === 'text' ? 'w-32 h-32 bg-[#007187] mix-blend-normal' : 
                            'w-4 h-4 bg-white'}`}
                        style={{ left: 0, top: 0, willChange: 'transform' }}
                    >
                        {cursorType === 'hover' && <ArrowUpRightIcon size={32} />}
                        {cursorType === 'text' && <span className="text-white font-black text-xs uppercase tracking-tighter text-center px-4">{copyStatus ? 'Copied!' : 'Focus'}</span>}
                    </div>

                    <nav className="fixed top-0 left-0 w-full z-50 p-6 md:p-8 flex justify-between items-center mix-blend-difference text-white">
                        <div 
                            className="h-8 md:h-10 cursor-none" 
                            onMouseEnter={onEnterHover} 
                            onMouseLeave={onLeave}
                            onClick={scrollToTop}
                        >
                            <img 
                                src="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/maxvw.svg" 
                                alt="MAXVW Logo" 
                                className="h-full w-auto invert"
                            />
                        </div>
                        <div className="font-mono text-xs uppercase tracking-widest">
                            EST. 2026 / HONG KONG
                        </div>
                    </nav>

                    <main className="relative pt-40 px-6 min-h-screen flex flex-col justify-center">
                        <div className="relative group">
                            <h1 className="text-huge font-huge mb-4">
                                <div className="flex items-center gap-4">
                                    CREATIVE
                                    <div className="h-[2px] flex-grow bg-black mt-8 hidden md:block" />
                                </div>
                                <div className="flex flex-wrap items-baseline gap-x-8">
                                    <span className="font-serif-italic text-[#007187] hover:text-[#871600] transition-colors duration-500" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                                        DEVELOPMENT
                                    </span>
                                    <span className="text-sm font-mono-code lowercase tracking-tighter block md:inline max-w-xs leading-tight opacity-40">
                                        (and other questionable ways to spend time)
                                    </span>
                                </div>
                                <div className="outline-text uppercase" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                                    Experimental
                                </div>
                            </h1>
                        </div>

                        <div className="mt-20 flex flex-col md:flex-row justify-between items-end gap-10">
                            <p className="max-w-xl text-2xl font-medium leading-tight tracking-tight">
                                maxvw.xyz is a digital sandbox where <span className="underline decoration-4 decoration-[#007187]">chaos</span> meets code. No roadmaps, no promises, just raw exploration in the browser.
                            </p>
                            <div onMouseEnter={onEnterHover} onMouseLeave={onLeave} className="group cursor-none relative overflow-hidden bg-black text-white p-12 rounded-full w-48 h-48 flex items-center justify-center hover:scale-110 transition-transform duration-500 border border-[#007187]/20">
                                <div className="absolute inset-0 bg-[#007187] translate-y-full group-hover:translate-y-0 transition-transform duration-500" />
                                <ArrowUpRightIcon size={64} />
                            </div>
                        </div>
                    </main>

                    <div className="py-40 whitespace-nowrap overflow-hidden border-y-2 border-black group" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                        <div className="inline-block animate-marquee group-hover:pause">
                            <span className="text-8xl font-huge px-4 outline-text">FAST INTERFACE — </span>
                            <span className="text-8xl font-huge px-4 italic text-[#007187]">CLEAN CODE — </span>
                            <span className="text-8xl font-huge px-4 outline-text">NO BULLSHIT — </span>
                            <span className="text-8xl font-huge px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                        </div>
                        <div className="inline-block animate-marquee group-hover:pause">
                            <span className="text-8xl font-huge px-4 outline-text">FAST INTERFACE — </span>
                            <span className="text-8xl font-huge px-4 italic text-[#007187]">CLEAN CODE — </span>
                            <span className="text-8xl font-huge px-4 outline-text">NO BULLSHIT — </span>
                            <span className="text-8xl font-huge px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                        </div>
                    </div>

                    <section className="py-20 md:py-40 px-0 md:px-6 grid grid-cols-1 md:grid-cols-2 gap-px bg-black border-b border-black overflow-hidden">
                        <FeatureBox 
                            number="01" title="The Lab" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Where I throw JS frameworks at the wall to see what sticks. Spoiler: none of them."
                        />
                        <FeatureBox 
                            number="02" title="Experiments" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Visual garbage? Maybe. Interactive? Always. Optimized? Absolutely not."
                        />
                        <FeatureBox 
                            number="03" title="Philosophy" onEnter={onEnterHover} onLeave={onLeave}
                            desc="If the user can't find the menu in 3 seconds, they don't deserve the content."
                        />
                        <FeatureBox 
                            number="04" title="Contact" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Send me a mail or don't. I'm probably busy debugging a typo."
                        />
                    </section>

                    <footer className="p-10 flex flex-col md:flex-row justify-between items-center gap-10 relative overflow-hidden">
                        <div className="flex gap-10 font-bold uppercase text-sm tracking-tighter">
                            <a href="https://github.com/MrMAXVW" target="_blank" rel="noopener noreferrer" className="hover:text-[#007187] hover:line-through" onMouseEnter={onEnterHover} onMouseLeave={onLeave}>Github</a>
                            <button 
                                onClick={handleCopyEmail}
                                className="hover:text-[#007187] hover:line-through uppercase focus:outline-none" 
                                onMouseEnter={onEnterHover} 
                                onMouseLeave={onLeave}
                            >
                                {copyStatus ? 'Email Copied!' : 'Email'}
                            </button>
                        </div>

                        <div className="font-mono text-[10px] opacity-40 text-center md:text-right">
                            ALL RIGHTS RESERVED © 2026<br/>
                            BUILT BY A HUMAN (PROBABLY)
                        </div>
                    </footer>

                    <div 
                        className="fixed pointer-events-none z-0 w-96 h-96 bg-[#007187] blur-[180px] opacity-10 rounded-full"
                        style={{ transform: `translate3d(${mousePos.x - 192}px, ${mousePos.y - 192}px, 0)`, willChange: 'transform' }}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
