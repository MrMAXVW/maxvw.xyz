<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maxvw.xyz</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/favicon.svg">
    
    <!-- Tailwind CSS with Dark Mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&family=Playwrite+NZ+Guides&family=Fira+Code:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            cursor: none;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
        }

        /* Hide custom cursor on mobile/touch devices */
        @media (pointer: coarse) {
            body { cursor: auto !important; }
            .custom-cursor { display: none !important; }
        }

        .font-huge { font-family: 'Inter', sans-serif; font-weight: 900; }
        .font-marquee { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; }
        .font-mono-code { font-family: 'Fira Code', 'Consolas', 'Monaco', monospace; }
        .font-playwrite { font-family: 'Playwrite NZ Guides', cursive; }
        
        .text-huge { font-size: clamp(4rem, 15vw, 18rem); line-height: 0.85; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1px black; color: transparent; }
        .dark .outline-text { -webkit-text-stroke: 1px white; color: transparent; }
        .outline-text:hover { color: black; transition: 0.3s ease; }
        .dark .outline-text:hover { color: white; }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        .pause { animation-play-state: paused; }

        .selection-lake-blue ::selection {
            background: #007187;
            color: white;
        }

        .hyphens-auto {
            hyphens: auto;
            word-wrap: break-word;
        }

        /* Animation for crazy mode background transitions */
        .crazy-transition {
            transition: background-color 0.1s linear !important;
        }

        /* Terminal specific scrollbar */
        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }
    </style>
</head>
<body class="selection-lake-blue bg-white dark:bg-black text-black dark:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const ArrowRightIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
        );
        const ArrowUpRightIcon = ({ size = 24 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M7 17L17 7M17 7H7M17 7V17"/>
            </svg>
        );
        
        const SunIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        );
        const MoonIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        );
        const TerminalIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        );

        const Terminal = ({ isOpen, onClose, setDarkMode, setIsCrazy, isCrazy }) => {
            const [input, setInput] = useState('');
            const [history, setHistory] = useState([
                { type: 'sys', content: 'MAXVW TERMINAL v1.0.4' },
                { type: 'sys', content: 'Type "help" to see available commands or "exit" to quit.' },
                { type: 'sys', content: 'Hold SPACEBAR to toggle this terminal anytime.' }
            ]);
            const inputRef = useRef(null);
            const historyEndRef = useRef(null);

            useEffect(() => {
                if (isOpen && inputRef.current) {
                    inputRef.current.focus();
                }
            }, [isOpen]);

            useEffect(() => {
                historyEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [history]);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.trim().toLowerCase();
                    const newHistory = [...history, { type: 'user', content: `> ${input}` }];
                    
                    switch(cmd) {
                        case 'help':
                            newHistory.push({ type: 'sys', content: 'Commands: help, dark, light, crazy, clear, exit, whoami, ping' });
                            break;
                        case 'dark':
                            setDarkMode(true);
                            newHistory.push({ type: 'sys', content: 'Switched to the dark side. Good choice.' });
                            break;
                        case 'light':
                            setDarkMode(false);
                            newHistory.push({ type: 'sys', content: 'My eyes! Why would you do that?' });
                            break;
                        case 'crazy':
                            setIsCrazy(!isCrazy);
                            newHistory.push({ type: 'sys', content: isCrazy ? 'Chaos stopped. Booooring.' : 'Chaos initiated. Enjoy the migraine.' });
                            break;
                        case 'clear':
                            setHistory([{ type: 'sys', content: 'Terminal cleared.' }]);
                            setInput('');
                            return;
                        case 'exit':
                            onClose();
                            break;
                        case 'whoami':
                            newHistory.push({ type: 'sys', content: 'Just another soul stuck in a browser. Probably Max\'s friend.' });
                            break;
                        case 'ping':
                            newHistory.push({ type: 'sys', content: 'Pong. I\'m alive, unlike your social life.' });
                            break;
                        case '':
                            break;
                        default:
                            newHistory.push({ type: 'error', content: `Command not found: ${cmd}. Try "help" if you're lost.` });
                    }
                    
                    setHistory(newHistory);
                    setInput('');
                }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[10002] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 md:p-10 cursor-auto">
                    <div className="w-full max-w-3xl bg-[#111] border border-white/20 rounded-xl overflow-hidden flex flex-col shadow-2xl h-[60vh]">
                        <div className="bg-[#222] p-3 flex justify-between items-center border-b border-white/10">
                            <div className="flex gap-2 items-center">
                                <div className="w-3 h-3 rounded-full bg-red-500" />
                                <div className="w-3 h-3 rounded-full bg-yellow-500" />
                                <div className="w-3 h-3 rounded-full bg-green-500" />
                                <span className="ml-3 font-mono-code text-[10px] text-white/40 uppercase tracking-widest flex items-center gap-2">
                                    <TerminalIcon /> Spacebar Terminal
                                </span>
                            </div>
                            <button onClick={onClose} className="text-white/40 hover:text-white font-mono text-xs">CLOSE [ESC]</button>
                        </div>
                        <div className="flex-grow p-6 font-mono-code text-sm overflow-y-auto terminal-scroll">
                            {history.map((line, i) => (
                                <div key={i} className={`mb-1 ${line.type === 'error' ? 'text-red-400' : line.type === 'user' ? 'text-[#007187]' : 'text-white/80'}`}>
                                    {line.content}
                                </div>
                            ))}
                            <div ref={historyEndRef} />
                        </div>
                        <div className="p-6 pt-0 flex gap-2 items-center">
                            <span className="text-[#007187] font-bold">{'>'}</span>
                            <input 
                                ref={inputRef}
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={handleCommand}
                                className="flex-grow bg-transparent border-none outline-none text-white font-mono-code"
                                autoFocus
                            />
                        </div>
                    </div>
                </div>
            );
        };

        const FeatureBox = ({ number, title, desc, onEnter, onLeave }) => {
            const [isWip, setIsWip] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [isWip]);

            if (isWip) {
                return (
                    <div 
                        className="bg-black dark:bg-white p-8 md:p-12 flex flex-col justify-center items-center gap-4 group cursor-none h-full min-h-[300px] md:min-h-[400px]"
                        onMouseEnter={onEnter} 
                        onMouseLeave={onLeave}
                        onClick={() => setIsWip(false)}
                    >
                        <div className="text-[#007187] font-huge text-6xl md:text-8xl tracking-tighter italic">WIP</div>
                        <div className="font-mono-code text-white dark:text-black text-[10px] opacity-50 uppercase text-center">
                            Work in progress.<br/>
                            (Click to dismiss)
                        </div>
                    </div>
                );
            }

            return (
                <div 
                    className="bg-white dark:bg-black p-8 md:p-12 flex flex-col gap-6 md:gap-8 hover:bg-[#f5f5f5] dark:hover:bg-[#111] transition-colors group cursor-none h-full min-h-[300px] md:min-h-[400px] border-b md:border-none border-black/10 dark:border-white/10"
                    onMouseEnter={onEnter} 
                    onMouseLeave={onLeave} 
                    onClick={() => setIsWip(true)}
                >
                    <div className="text-[10px] md:text-xs font-mono opacity-40 uppercase tracking-widest">{number} / 04</div>
                    <div className="flex-grow">
                        <h3 className="text-4xl md:text-6xl font-huge mb-3 md:mb-4 group-hover:translate-x-2 group-hover:text-[#007187] transition-all tracking-tighter leading-none break-words hyphens-auto">
                            {title}
                        </h3>
                        <p className="text-lg md:text-xl max-w-sm opacity-60 leading-tight">
                            {desc}
                        </p>
                    </div>
                    <div className="mt-auto">
                        <div className="w-10 h-10 md:w-12 md:h-12 rounded-full border border-black dark:border-white flex items-center justify-center group-hover:bg-[#007187] group-hover:border-[#007187] group-hover:text-white transition-all">
                            <ArrowRightIcon size={18} />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [cursorType, setCursorType] = useState('default'); 
            const [copyStatus, setCopyStatus] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [uselessMessage, setUselessMessage] = useState(null);
            const [clickCount, setClickCount] = useState(0);
            const [isCrazy, setIsCrazy] = useState(false);
            const [crazyBg, setCrazyBg] = useState('');
            const [terminalOpen, setTerminalOpen] = useState(false);
            
            const cursorRef = useRef(null);
            const requestRef = useRef();

            // Toggle Dark Mode
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            // Spacebar Terminal Listener
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && !terminalOpen) {
                        setTerminalOpen(true);
                    }
                    if (e.key === 'Escape') {
                        setTerminalOpen(false);
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [terminalOpen]);

            // Crazy Mode Loop
            useEffect(() => {
                let interval;
                if (isCrazy) {
                    interval = setInterval(() => {
                        const randomColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
                        setCrazyBg(randomColor);
                    }, 100);
                } else {
                    setCrazyBg('');
                }
                return () => clearInterval(interval);
            }, [isCrazy]);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    setMousePos({ x: e.clientX, y: e.clientY });
                };

                const updateCursor = () => {
                    if (cursorRef.current) {
                        cursorRef.current.style.transform = `translate3d(${mousePos.x}px, ${mousePos.y}px, 0) translate(-50%, -50%)`;
                    }
                    requestRef.current = requestAnimationFrame(updateCursor);
                };

                window.addEventListener('mousemove', handleMouseMove);
                requestRef.current = requestAnimationFrame(updateCursor);

                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    cancelAnimationFrame(requestRef.current);
                };
            }, [mousePos]);

            const onEnterHover = () => setCursorType('hover');
            const onEnterText = () => setCursorType('text');
            const onLeave = () => setCursorType('default');

            const handleUselessClick = () => {
                setUselessMessage("This is a useless button.");
                setTimeout(() => setUselessMessage(null), 2000);
                
                const newCount = clickCount + 1;
                setClickCount(newCount);
                
                if (newCount === 5) {
                    setIsCrazy(!isCrazy);
                    setClickCount(0); // Reset for next toggle
                }
            };

            const handleCopyEmail = (e) => {
                e.preventDefault();
                const email = "max@maxvw.xyz";
                const textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                } catch (err) {
                    console.error('Fallback: Oops, unable to copy', err);
                }
                document.body.removeChild(textArea);
            };

            const scrollToTop = () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            return (
                <div 
                    className={`min-h-screen text-black dark:text-white font-sans overflow-x-hidden cursor-none transition-colors duration-500 ${isCrazy ? 'crazy-transition' : ''}`}
                    style={{ backgroundColor: isCrazy ? crazyBg : (darkMode ? '#000' : '#fff') }}
                >
                    {/* High-Performance Custom Cursor */}
                    <div 
                        ref={cursorRef}
                        className={`custom-cursor fixed pointer-events-none z-[9999] rounded-full flex items-center justify-center overflow-hidden transition-[width,height,background-color] duration-200 ease-out mix-blend-difference
                        ${cursorType === 'hover' ? 'w-24 h-24 bg-white' : 
                            cursorType === 'text' ? 'w-32 h-32 bg-[#007187] mix-blend-normal' : 
                            'w-4 h-4 bg-white'}`}
                        style={{ left: 0, top: 0, willChange: 'transform' }}
                    >
                        {cursorType === 'hover' && <ArrowUpRightIcon size={32} />}
                        {cursorType === 'text' && <span className="text-white font-black text-xs uppercase tracking-tighter text-center px-4">{copyStatus ? 'Copied!' : 'Focus'}</span>}
                    </div>

                    {/* Spacebar Terminal UI */}
                    <Terminal 
                        isOpen={terminalOpen} 
                        onClose={() => setTerminalOpen(false)} 
                        setDarkMode={setDarkMode}
                        setIsCrazy={setIsCrazy}
                        isCrazy={isCrazy}
                    />

                    {/* Useless Pop-up */}
                    {uselessMessage && (
                        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[10001] bg-black text-white px-8 py-4 rounded-lg font-mono text-sm uppercase tracking-widest animate-bounce shadow-2xl border-2 border-white">
                            {uselessMessage}
                        </div>
                    )}

                    {/* Mobile Toast Notification */}
                    {copyStatus && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] bg-black dark:bg-white text-white dark:text-black px-6 py-3 rounded-full font-mono text-xs uppercase tracking-widest sm:hidden">
                            Email Copied to Clipboard
                        </div>
                    )}

                    <nav className="fixed top-0 left-0 w-full z-50 p-6 md:p-8 flex justify-between items-center mix-blend-difference text-white">
                        <div 
                            className="h-8 md:h-10 cursor-none flex items-center" 
                        >
                            <img 
                                src="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/maxvw.svg" 
                                alt="MAXVW Logo" 
                                className="h-full w-auto invert cursor-none"
                                onMouseEnter={onEnterHover} 
                                onMouseLeave={onLeave}
                                onClick={scrollToTop}
                            />
                        </div>
                        
                        <div className="flex items-center gap-6 md:gap-8">
                            <div className="font-mono text-[10px] md:text-xs uppercase tracking-widest hidden sm:block">
                                {isCrazy ? 'STAY CALM — DON\'T PANIC' : 'EST. 1998 / HONG KONG'}
                            </div>
                            
                            <button 
                                onClick={() => setDarkMode(!darkMode)}
                                className="p-2 border border-white/20 rounded-full flex items-center justify-center hover:bg-white hover:text-black transition-all cursor-none"
                                onMouseEnter={onEnterHover}
                                onMouseLeave={onLeave}
                            >
                                {darkMode ? <SunIcon /> : <MoonIcon />}
                            </button>
                        </div>
                    </nav>

                    <main className="relative pt-40 px-6 min-h-screen flex flex-col justify-center">
                        <div className="relative group">
                            <h1 className="text-huge font-huge mb-4">
                                <div className="flex items-center gap-4">
                                    CREATIVE
                                    <div className={`h-[2px] flex-grow bg-black dark:bg-white mt-8 hidden md:block ${isCrazy ? 'animate-pulse' : ''}`} />
                                </div>
                                <div className="flex flex-wrap items-baseline gap-x-8">
                                    <span className="font-serif-italic text-[#007187] hover:text-[#871600] transition-colors duration-500" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                                        DEVELOPMENT
                                    </span>
                                    <span className="text-sm font-mono-code lowercase tracking-tighter block md:inline max-w-xs leading-tight opacity-40">
                                        (and other questionable ways to spend time)
                                    </span>
                                </div>
                                <div className="outline-text uppercase" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                                    Experimental
                                </div>
                            </h1>
                        </div>

                        <div className="mt-20 flex flex-col md:flex-row justify-between items-end gap-10">
                            <p className="max-w-xl text-xl md:text-2xl font-medium leading-tight tracking-tight">
                                maxvw.xyz is a digital sandbox where <span className="underline decoration-4 decoration-[#007187]">chaos</span> meets code. No roadmaps, no promises, just raw exploration in the browser.
                            </p>
                            <button 
                                onClick={handleUselessClick}
                                onMouseEnter={onEnterHover} 
                                onMouseLeave={onLeave} 
                                className="group cursor-none relative overflow-hidden bg-black dark:bg-white text-white dark:text-black p-8 md:p-12 rounded-full w-32 h-32 md:w-48 md:h-48 flex flex-col items-center justify-center hover:scale-110 transition-transform duration-500 border border-[#007187]/20"
                            >
                                <div className="absolute inset-0 bg-[#007187] translate-y-full group-hover:translate-y-0 transition-transform duration-500" />
                                <ArrowUpRightIcon size={48} className="relative z-10 md:w-16 md:h-16 mb-1" />
                                <div className="relative z-10 text-[8px] uppercase font-mono opacity-0 group-hover:opacity-100 transition-opacity">
                                    {isCrazy ? 'Stop Chaos' : `Click ${5 - clickCount}`}
                                </div>
                            </button>
                        </div>
                    </main>

                    <div className="py-20 md:py-40 border-y-2 border-black dark:border-white/20 group overflow-hidden" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                        <div className="flex whitespace-nowrap animate-marquee group-hover:pause w-fit">
                            <div className="flex items-center font-marquee">
                                <span className="text-5xl md:text-8xl px-4 outline-text">{isCrazy ? 'OH NO — ' : 'FAST INTERFACE — '}</span>
                                <span className="text-5xl md:text-8xl px-4 italic text-[#007187]">{isCrazy ? 'HELP ME — ' : 'CLEAN CODE — '}</span>
                                <span className="text-5xl md:text-8xl px-4 outline-text">{isCrazy ? 'MY EYES — ' : 'NO BULLSHIT — '}</span>
                                <span className="text-5xl md:text-8xl px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                            </div>
                            <div className="flex items-center font-marquee">
                                <span className="text-5xl md:text-8xl px-4 outline-text">{isCrazy ? 'OH NO — ' : 'FAST INTERFACE — '}</span>
                                <span className="text-5xl md:text-8xl px-4 italic text-[#007187]">{isCrazy ? 'HELP ME — ' : 'CLEAN CODE — '}</span>
                                <span className="text-5xl md:text-8xl px-4 outline-text">{isCrazy ? 'MY EYES — ' : 'NO BULLSHIT — '}</span>
                                <span className="text-5xl md:text-8xl px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                            </div>
                        </div>
                    </div>

                    <section className="py-20 md:py-40 px-0 md:px-6 grid grid-cols-1 md:grid-cols-2 gap-px bg-black dark:bg-white/10 border-b border-black dark:border-white/10 overflow-hidden">
                        <FeatureBox 
                            number="01" title="The Lab" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Where I throw JS frameworks at the wall to see what sticks. Spoiler: none of them."
                        />
                        <FeatureBox 
                            number="02" title="Experiments" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Visual garbage? Maybe. Interactive? Always. Optimized? Absolutely not."
                        />
                        <FeatureBox 
                            number="03" title="Philosophy" onEnter={onEnterHover} onLeave={onLeave}
                            desc="If the user can't find the menu in 3 seconds, they don't deserve the content."
                        />
                        <FeatureBox 
                            number="04" title="Contact" onEnter={onEnterHover} onLeave={onLeave}
                            desc="Send me a mail or don't. I'm probably busy debugging a typo."
                        />
                    </section>

                    <footer className="py-10 px-6 md:p-10 flex flex-col md:flex-row justify-between items-center gap-8 md:gap-10 border-t border-black/5 dark:border-white/5">
                        <div className="flex gap-10 font-bold uppercase text-xs md:text-sm tracking-tighter">
                            <a href="https://github.com/MrMAXVW" target="_blank" rel="noopener noreferrer" className="hover:text-[#007187] hover:line-through" onMouseEnter={onEnterHover} onMouseLeave={onLeave}>Github</a>
                            <button 
                                onClick={handleCopyEmail}
                                className="hover:text-[#007187] hover:line-through uppercase focus:outline-none cursor-none" 
                                onMouseEnter={onEnterHover} 
                                onMouseLeave={onLeave}
                            >
                                {copyStatus ? 'Email Copied!' : 'Email'}
                            </button>
                        </div>

                        <div className="font-mono text-[9px] md:text-[10px] opacity-40 text-center md:text-right leading-relaxed">
                            ALL RIGHTS RESERVED © 1998<br/>
                            <span className="md:hidden">——————<br/></span>
                            BUILT BY A HUMAN (PROBABLY)
                        </div>
                    </footer>

                    {/* Fixed floating terminal trigger for accessibility/mobile */}
                    <button 
                        onClick={() => setTerminalOpen(true)}
                        className="fixed bottom-8 right-8 z-[9998] w-10 h-10 bg-black dark:bg-white text-white dark:text-black rounded-full flex items-center justify-center opacity-20 hover:opacity-100 transition-opacity cursor-none"
                        onMouseEnter={onEnterHover}
                        onMouseLeave={onLeave}
                    >
                        <TerminalIcon />
                    </button>

                    {/* Gradient Glow */}
                    <div 
                        className="fixed pointer-events-none z-0 w-96 h-96 bg-[#007187] blur-[180px] opacity-10 dark:opacity-20 rounded-full hidden sm:block transition-all"
                        style={{ transform: `translate3d(${mousePos.x - 192}px, ${mousePos.y - 192}px, 0)`, scale: isCrazy ? 3 : (darkMode ? 1.5 : 1), willChange: 'transform' }}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
