<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maxvw.xyz | pronounced as max'view</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/favicon.svg">
    
    <!-- Tailwind CSS with Dark Mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/@babel/standalone/lucide-react.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&family=Playwrite+NZ+Guides&family=Fira+Code:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            cursor: none;
            overflow-x: hidden;
            transition: background-color 0.5s ease;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @media (pointer: coarse) {
            body { cursor: auto !important; }
            .custom-cursor { display: none !important; }
        }

        .font-huge { font-family: 'Inter', sans-serif; font-weight: 900; }
        .font-marquee { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 900; }
        .font-mono-code { font-family: 'Fira Code', 'Consolas', 'Monaco', monospace; }
        
        /* Updated text-huge to make mobile version as massive as desktop */
        .text-huge { font-size: clamp(5rem, 13vw, 17rem); line-height: 0.85; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1px black; color: transparent; }
        .dark .outline-text { -webkit-text-stroke: 1px white; color: transparent; }
        
        .magnetic-letter {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
            white-space: pre;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        .pause { animation-play-state: paused; }

        .crazy-transition {
            transition: background-color 0.1s linear !important;
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-shake {
            animation: shake 0.5s infinite;
        }

        .is-destroyed * {
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 1.5s ease !important;
            pointer-events: none !important;
        }

        @keyframes pulse-red {
            0%, 100% { background-color: #007187; }
            50% { background-color: #871600; }
        }
        .animate-danger {
            animation: pulse-red 2s infinite;
        }

        /* Modal Styles */
        .window-shadow {
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="bg-white dark:bg-black text-black dark:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const ArrowUpRightIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M7 17L17 7M17 7H7M17 7V17"/>
            </svg>
        );
        const SunIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        );
        const MoonIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        );
        const TerminalIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        );

        const PopupModal = ({ id, message, onClose, position }) => {
            return (
                <div 
                    className="fixed z-[20000] bg-gray-200 border-2 border-white border-r-gray-600 border-b-gray-600 p-1 window-shadow cursor-auto select-none max-w-[85vw]"
                    style={{ 
                        left: position.x, 
                        top: position.y,
                        width: '260px'
                    }}
                >
                    <div className="bg-[#000080] text-white px-2 py-1 flex justify-between items-center text-[10px] font-bold">
                        <span className="truncate">SYSTEM CRITICAL ERROR</span>
                        <button onClick={() => onClose(id)} className="bg-gray-200 text-black px-1 ml-2 leading-none border border-black hover:bg-red-500 hover:text-white transition-colors">X</button>
                    </div>
                    <div className="p-4 flex gap-4 items-start text-black">
                        <div className="shrink-0 w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-xl">!</div>
                        <div className="text-[11px] font-mono leading-tight flex-grow break-words">
                            {message}
                            <div className="mt-4 flex justify-end">
                                <button onClick={() => onClose(id)} className="border-2 border-white border-r-gray-600 border-b-gray-600 px-4 py-1 bg-gray-200 hover:bg-gray-300 active:border-gray-600 active:border-r-white active:border-b-white">OK</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MagneticText = ({ text, className = "", mousePos, onMouseEnter, onMouseLeave }) => {
            const containerRef = useRef(null);
            const letters = useMemo(() => text.split('').map((char, i) => ({
                char,
                id: i,
                ref: React.createRef()
            })), [text]);

            useEffect(() => {
                letters.forEach(letter => {
                    if (!letter.ref.current) return;
                    const rect = letter.ref.current.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const dx = mousePos.x - centerX;
                    const dy = mousePos.y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const radius = 120; 
                    if (distance < radius) {
                        const power = (radius - distance) / radius;
                        const moveX = (dx / distance) * power * -50; 
                        const moveY = (dy / distance) * power * -50;
                        letter.ref.current.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
                    } else {
                        letter.ref.current.style.transform = `translate3d(0, 0, 0)`;
                    }
                });
            }, [mousePos, letters]);

            return (
                <div ref={containerRef} className={`inline-block ${className}`} onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
                    {letters.map((letter) => (
                        <span key={letter.id} ref={letter.ref} className="magnetic-letter">
                            {letter.char === ' ' ? '\u00A0' : letter.char}
                        </span>
                    ))}
                </div>
            );
        };

        const Terminal = ({ isOpen, onClose, setDarkMode, setIsCrazy, isCrazy, handleRepair }) => {
            const [input, setInput] = useState('');
            const [history, setHistory] = useState([
                { type: 'sys', content: 'MAXVW TERMINAL v1.0.6' },
                { type: 'sys', content: 'Hold SPACEBAR to toggle.' }
            ]);
            const historyEndRef = useRef(null);

            useEffect(() => {
                historyEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [history]);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.trim().toLowerCase();
                    const newHistory = [...history, { type: 'user', content: `> ${input}` }];
                    switch(cmd) {
                        case 'help':
                            newHistory.push({ type: 'sys', content: 'Commands: help, dark, light, crazy, repair, clear, exit, whoami' });
                            break;
                        case 'dark': setDarkMode(true); break;
                        case 'light': setDarkMode(false); break;
                        case 'crazy': setIsCrazy(!isCrazy); break;
                        case 'repair': handleRepair(); break;
                        case 'clear': setHistory([{ type: 'sys', content: 'Cleared.' }]); setInput(''); return;
                        case 'exit': onClose(); break;
                        case 'whoami': newHistory.push({ type: 'sys', content: 'A soul stuck in a digital glitch.' }); break;
                        default: newHistory.push({ type: 'error', content: `Unknown command: ${cmd}` });
                    }
                    setHistory(newHistory);
                    setInput('');
                }
            };

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[10002] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6 cursor-auto select-auto">
                    <div className="w-full max-w-[320px] md:max-w-2xl bg-[#111] border border-white/20 rounded-xl overflow-hidden flex flex-col shadow-2xl h-[60vh] md:h-[50vh]">
                        <div className="bg-[#222] p-2 flex justify-between items-center border-b border-white/10">
                            <span className="ml-2 font-mono-code text-[10px] text-white/40 uppercase">Terminal</span>
                            <button onClick={onClose} className="text-white/40 hover:text-white font-mono text-[10px] px-2">EXIT</button>
                        </div>
                        <div className="flex-grow p-4 font-mono-code text-[10px] md:text-xs overflow-y-auto terminal-scroll text-white">
                            {history.map((line, i) => (
                                <div key={i} className={`mb-1 break-words ${line.type === 'error' ? 'text-red-400' : line.type === 'user' ? 'text-[#007187]' : 'text-white/60'}`}>
                                    {line.content}
                                </div>
                            ))}
                            <div ref={historyEndRef} />
                        </div>
                        <div className="p-4 pt-0 flex gap-2 items-center">
                            <span className="text-[#007187] font-bold text-[10px] md:text-xs">{'>'}</span>
                            <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={handleCommand} className="flex-grow bg-transparent border-none outline-none text-white font-mono-code text-[10px] md:text-xs" spellCheck="false" autoComplete="off" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [travelDistance, setTravelDistance] = useState(0);
            const [cursorType, setCursorType] = useState('default'); 
            const [copyStatus, setCopyStatus] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [uselessMessage, setUselessMessage] = useState(null);
            const [clickCount, setClickCount] = useState(0);
            const [isCrazy, setIsCrazy] = useState(false);
            const [crazyBg, setCrazyBg] = useState('');
            const [terminalOpen, setTerminalOpen] = useState(false);
            const [anxietyTime, setAnxietyTime] = useState(new Date());
            const [stressCount, setStressCount] = useState(0);
            const [isDestroyed, setIsDestroyed] = useState(false);
            const [modals, setModals] = useState([]);
            const [scrollProgress, setScrollProgress] = useState(0);
            
            const cursorRef = useRef(null);
            const lastPos = useRef({ x: 0, y: 0 });
            const shakeAcc = useRef(0);
            const lastShakeTime = useRef(Date.now());

            useEffect(() => {
                const handleScroll = () => {
                    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
                    setScrollProgress(scrolled);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setAnxietyTime(prev => new Date(prev.getTime() + 1500));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
            }, [darkMode]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && !terminalOpen && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        setTerminalOpen(true);
                    }
                    if (e.key === 'Escape') setTerminalOpen(false);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [terminalOpen]);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const dx = e.clientX - lastPos.current.x;
                    const dy = e.clientY - lastPos.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const now = Date.now();
                    if (now - lastShakeTime.current < 500) {
                        shakeAcc.current += dist;
                        if (shakeAcc.current > 5000 && !isDestroyed) {
                            shakeAcc.current = 0;
                        }
                    } else { shakeAcc.current = 0; }
                    lastShakeTime.current = now;
                    if (dist < 500) setTravelDistance(prev => prev + dist);
                    lastPos.current = { x: e.clientX, y: e.clientY };
                    setMousePos({ x: e.clientX, y: e.clientY });
                    if (cursorRef.current) cursorRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [isDestroyed]);

            useEffect(() => {
                if (isCrazy) {
                    const interval = setInterval(() => setCrazyBg(`hsl(${Math.random() * 360}, 70%, 50%)`), 100);
                    return () => clearInterval(interval);
                }
            }, [isCrazy]);

            const onEnterHover = () => setCursorType('hover');
            const onEnterText = () => setCursorType('text');
            const onLeave = () => setCursorType('default');

            const handleUselessClick = () => {
                setUselessMessage("This is a useless button.");
                setTimeout(() => setUselessMessage(null), 2000);
                const newCount = clickCount + 1;
                setClickCount(newCount);
                if (newCount === 5) { setIsCrazy(!isCrazy); setClickCount(0); }
            };

            const triggerModals = () => {
                const messages = [
                    "叫咗你唔好撳㗎啦！",
                    "點解你咁唔聽話？",
                    "System overload detected.",
                    "Your curiosity is dangerous.",
                    "An unexpected error has occurred.",
                    "User.intelligence is null.",
                    "Stop clicking me.",
                    "你仲撳？",
                    "ERROR: Curiosity killed the cat.",
                    "Kernel Panic: Too much Max.",
                    "Please reboot your life.",
                    "Unauthorized access to fun."
                ];
                
                const count = window.innerWidth < 768 ? 8 : 15;
                for(let i=0; i < count; i++) {
                    setTimeout(() => {
                        const winWidth = window.innerWidth;
                        const winHeight = window.innerHeight;
                        const modalWidth = 260;
                        const modalHeight = 150;
                        
                        setModals(prev => [...prev, {
                            id: Date.now() + i,
                            message: messages[Math.floor(Math.random() * messages.length)],
                            position: {
                                x: Math.max(10, Math.random() * (winWidth - modalWidth - 20)),
                                y: Math.max(10, Math.random() * (winHeight - modalHeight - 20))
                            }
                        }]);
                    }, i * 150);
                }
            };

            const closePopup = (id) => {
                setModals(prev => prev.filter(m => m.id !== id));
            };

            const handleCopyEmail = (e) => {
                e.preventDefault();
                const email = "max@maxvw.xyz";
                const textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleRepair = () => {
                setIsDestroyed(false);
                setModals([]);
                setUselessMessage("SYSTEM REPAIRED.");
                setTimeout(() => setUselessMessage(null), 2000);
            };

            return (
                <div 
                    className={`min-h-screen text-black dark:text-white font-sans cursor-none transition-colors duration-500 overflow-x-hidden ${isCrazy ? 'crazy-transition' : ''} ${isDestroyed ? 'is-destroyed' : ''}`}
                    style={{ backgroundColor: isCrazy ? crazyBg : (darkMode ? '#000' : '#fff') }}
                >
                    {/* Scroll Progress Bar at the Screen Bottom */}
                    <div className="fixed bottom-0 left-0 w-full h-[4px] z-[10005] bg-transparent overflow-hidden">
                        <div 
                            className="h-full bg-[#007187] shadow-[0_0_15px_#007187] transition-all duration-75 ease-out"
                            style={{ width: `${scrollProgress}%` }}
                        ></div>
                    </div>

                    <div 
                        ref={cursorRef}
                        className={`custom-cursor fixed pointer-events-none z-[9999] rounded-full flex items-center justify-center overflow-hidden transition-[width,height,background-color] duration-200 ease-out mix-blend-difference
                        ${cursorType === 'hover' ? 'w-24 h-24 bg-white' : 
                            cursorType === 'text' ? 'w-32 h-32 bg-[#007187] mix-blend-normal' : 
                            'w-4 h-4 bg-white'}`}
                        style={{ left: 0, top: 0, scale: isCrazy ? 2 : 1 }}
                    >
                        {cursorType === 'hover' && <ArrowUpRightIcon size={32} />}
                        {cursorType === 'text' && <span className="text-white font-black text-xs uppercase tracking-tighter text-center px-4">{copyStatus ? 'Copied!' : 'Avoid'}</span>}
                    </div>

                    <Terminal isOpen={terminalOpen} onClose={() => setTerminalOpen(false)} setDarkMode={setDarkMode} setIsCrazy={setIsCrazy} isCrazy={isCrazy} handleRepair={handleRepair} />

                    {modals.map(modal => (
                        <PopupModal key={modal.id} {...modal} onClose={closePopup} />
                    ))}

                    {uselessMessage && (
                        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-[10001] bg-black text-white px-8 py-4 rounded-lg font-mono text-sm uppercase tracking-widest animate-bounce border-2 border-white text-center">
                            {uselessMessage}
                        </div>
                    )}

                    <nav className="fixed top-0 left-0 w-full z-50 p-6 md:p-8 flex justify-between items-center mix-blend-difference text-white">
                        <img 
                            src="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/maxvw.svg" 
                            alt="Logo" className="h-8 md:h-10 invert cursor-none"
                            onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={() => window.scrollTo({top:0, behavior:'smooth'})}
                        />
                        <div className="flex items-center gap-6">
                            <div className="font-mono text-[10px] uppercase tracking-widest hidden sm:block opacity-60">
                                {isCrazy ? 'SYSTEM FAILURE' : 'EST. 1998 / HKG'}
                            </div>
                            <button onClick={() => setDarkMode(!darkMode)} className="p-2 border border-white/20 rounded-full cursor-none" onMouseEnter={onEnterHover} onMouseLeave={onLeave}>
                                {darkMode ? <SunIcon /> : <MoonIcon />}
                            </button>
                        </div>
                    </nav>

                    <div className="relative">
                        <main className="relative pt-40 pl-6 pr-0 md:pl-16 md:pr-0 min-h-screen flex flex-col justify-center overflow-hidden">
                            <div className="text-huge font-huge mb-4">
                                <div className="flex items-center gap-4 whitespace-nowrap overflow-hidden">
                                    <MagneticText text="CREATIVE" mousePos={mousePos} />
                                    <div className="h-[2px] flex-grow bg-black dark:bg-white mt-8 hidden md:block" />
                                </div>
                                <div className="flex flex-wrap items-baseline gap-x-8 whitespace-nowrap overflow-hidden">
                                    <MagneticText text="DEVELOPMENT" className="font-serif-italic text-[#007187] hover:text-[#871600] transition-colors duration-500" mousePos={mousePos} onMouseEnter={onEnterText} onMouseLeave={onLeave} />
                                </div>
                                <div className="whitespace-nowrap overflow-hidden">
                                    <MagneticText text="EXPERIMENTAL" className="outline-text uppercase" mousePos={mousePos} onMouseEnter={onEnterText} onMouseLeave={onLeave} />
                                </div>
                            </div>
                            <div className="mt-20 pr-6 md:pr-16 flex flex-col md:flex-row justify-between items-end gap-10">
                                <p className="max-w-xl text-xl md:text-2xl font-medium leading-tight">
                                    maxvw.xyz is a digital sandbox where <span className="underline decoration-4 decoration-[#007187]">chaos</span> meets code. No roadmaps, no promises, just raw exploration.
                                </p>
                                <button 
                                    onClick={handleUselessClick} onMouseEnter={onEnterHover} onMouseLeave={onLeave}
                                    className="group cursor-none relative overflow-hidden bg-black dark:bg-white text-white dark:text-black p-8 md:p-12 rounded-full w-32 h-32 md:w-48 md:h-48 flex flex-col items-center justify-center hover:scale-110 transition-transform duration-500 shrink-0"
                                >
                                    <div className="absolute inset-0 bg-[#007187] translate-y-full group-hover:translate-y-0 transition-transform duration-500" />
                                    <ArrowUpRightIcon size={48} className="relative z-10" />
                                    <div className="relative z-10 text-[8px] uppercase font-mono opacity-0 group-hover:opacity-100 transition-opacity mt-2">
                                        {isCrazy ? 'Stop' : `Toggle ${5-clickCount}`}
                                    </div>
                                </button>
                            </div>
                        </main>

                        <div className="py-20 md:py-40 border-y border-black/10 dark:border-white/10 group overflow-hidden" onMouseEnter={onEnterText} onMouseLeave={onLeave}>
                            <div className="flex whitespace-nowrap animate-marquee group-hover:pause w-fit">
                                <div className="flex items-center font-marquee text-5xl md:text-8xl">
                                    <span className="px-4 outline-text">FAST INTERFACE — </span><span className="px-4 italic text-[#007187]">CLEAN CODE — </span><span className="px-4 outline-text">NO BULLSHIT — </span><span className="px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                                </div>
                                <div className="flex items-center font-marquee text-5xl md:text-8xl">
                                    <span className="px-4 outline-text">FAST INTERFACE — </span><span className="px-4 italic text-[#007187]">CLEAN CODE — </span><span className="px-4 outline-text">NO BULLSHIT — </span><span className="px-4 italic text-[#871600]">MAXVW.XYZ — </span>
                                </div>
                            </div>
                        </div>

                        <section className="p-px bg-black/10 dark:bg-white/10 grid grid-cols-1 md:grid-cols-4 md:grid-rows-2 h-auto md:min-h-[800px] overflow-hidden">
                            <div className="bg-white dark:bg-black p-8 md:p-12 flex flex-col justify-between border-b md:border-r border-black/10 dark:border-white/10 md:col-span-2 overflow-hidden">
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest">System / Anxiety.Clock</div>
                                <div className="my-auto">
                                    <h3 className="text-6xl md:text-8xl font-huge tracking-tighter tabular-nums leading-none">
                                        {anxietyTime.toLocaleTimeString('en-GB', { hour12: false })}
                                    </h3>
                                    <p className="text-sm font-mono-code mt-4 opacity-40">Time is moving 1.5x faster here. Are you efficient enough?</p>
                                </div>
                                <div className="h-1 w-full bg-black/5 dark:bg-white/5 mt-8 overflow-hidden rounded-full">
                                    <div className="h-full bg-[#007187] transition-all duration-1000" style={{ width: `${(anxietyTime.getSeconds() / 60) * 100}%` }} />
                                </div>
                            </div>

                            <div 
                                className="bg-white dark:bg-black p-8 flex flex-col items-center justify-center border-b border-black/10 dark:border-white/10 cursor-none group relative active:scale-95 transition-transform overflow-hidden min-h-[300px]"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={() => setStressCount(s => s + 1)}
                            >
                                <div className="absolute top-8 left-8 text-[10px] font-mono opacity-40 uppercase tracking-widest">Interactive / Stress.Test</div>
                                <div className={`flex items-center justify-center transition-all duration-100 ${stressCount > 10 ? 'animate-shake' : ''}`}
                                    style={{ 
                                        fontSize: stressCount > 50 ? `${Math.min(100 + (stressCount - 50) * 5, 1000)}vh` : 'clamp(5rem, 15vw, 12rem)', 
                                        lineHeight: 1 
                                    }}>
                                    {stressCount === 0 ? '😐' : stressCount < 20 ? '😰' : stressCount < 40 ? '😱' : '💀'}
                                </div>
                                <div className="mt-8 text-center absolute bottom-8">
                                    <span className="font-mono-code text-xs opacity-40 uppercase">Clicks: {stressCount}</span>
                                </div>
                            </div>

                            <div 
                                className="p-8 flex flex-col justify-between border-b md:border-l border-black/10 dark:border-white/10 text-white cursor-none animate-danger hover:bg-black transition-all group overflow-hidden min-h-[200px]"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={triggerModals}
                            >
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest text-white/60">Utility / Panic.Button</div>
                                <div className="text-4xl font-huge leading-none tracking-tighter">DON'T TOUCH THIS.</div>
                                <div className="text-[8px] font-mono opacity-30 mt-4 leading-tight uppercase">High risk of system instability. Do not interact if you value your time.</div>
                            </div>

                            <div className="bg-white dark:bg-black p-8 md:p-12 flex flex-col justify-between border-black/10 dark:border-white/10 md:col-span-3 group overflow-hidden">
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest">Analytics / Life.Odometer</div>
                                <div className="my-8">
                                    <span className="text-xs font-mono-code opacity-40 block mb-2 uppercase text-wrap">Total Mouse Distance (PX):</span>
                                    <h3 className="text-5xl md:text-9xl font-huge tracking-tighter tabular-nums truncate">{Math.floor(travelDistance).toLocaleString()}</h3>
                                </div>
                                <div className="flex flex-wrap gap-4 font-mono text-[10px] uppercase opacity-40">
                                    <div>Calories: {(travelDistance * 0.0001).toFixed(4)}</div>
                                    <div>Sanity: Low</div>
                                </div>
                            </div>

                            <div 
                                className="bg-black dark:bg-white text-white dark:text-black p-8 flex flex-col justify-center items-center gap-4 cursor-none hover:bg-[#007187] transition-colors min-h-[150px]"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={handleCopyEmail}
                            >
                                <div className="text-sm font-huge tracking-widest uppercase">Get in touch</div>
                                <div className="font-mono-code text-[10px] opacity-40">MAX@MAXVW.XYZ</div>
                            </div>
                        </section>

                        <footer className="py-10 px-6 md:p-10 flex flex-col md:flex-row justify-between items-center gap-8 border-t border-black/5 dark:border-white/5">
                            <div className="flex gap-10 font-bold uppercase text-xs tracking-tighter">
                                <a href="https://github.com/MrMAXVW" target="_blank" rel="noopener noreferrer" className="hover:text-[#007187] hover:line-through" onMouseEnter={onEnterHover} onMouseLeave={onLeave}>Github</a>
                                <button onClick={handleCopyEmail} className="hover:text-[#007187] hover:line-through uppercase cursor-none" onMouseEnter={onEnterHover} onMouseLeave={onLeave}>
                                    {copyStatus ? 'Copied!' : 'Email'}
                                </button>
                            </div>
                            <div className="font-mono text-[10px] opacity-40">ALL RIGHTS RESERVED © 1998 maxvw.xyz</div>
                        </footer>
                    </div>

                    <button 
                        onClick={() => setTerminalOpen(true)}
                        className="fixed bottom-8 right-8 z-[9998] w-12 h-12 bg-black dark:bg-white text-white dark:text-black rounded-full flex items-center justify-center opacity-40 hover:opacity-100 transition-opacity cursor-none shadow-xl border border-white/20"
                        onMouseEnter={onEnterHover} onMouseLeave={onLeave}
                    >
                        <TerminalIcon />
                    </button>

                    <div 
                        className="fixed pointer-events-none z-0 w-96 h-96 bg-[#007187] blur-[180px] opacity-10 dark:opacity-20 rounded-full hidden sm:block transition-all"
                        style={{ transform: `translate3d(${mousePos.x - 192}px, ${mousePos.y - 192}px, 0)`, scale: isCrazy ? 3 : (darkMode ? 1.5 : 1), willChange: 'transform' }}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
