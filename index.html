<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>maxvw.xyz | pronounced as max'view</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/refs/heads/main/favicon.svg">
    
    <!-- Tailwind CSS with Dark Mode config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/@babel/standalone/lucide-react.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,700&family=Inter:wght@400;900&family=Montserrat:wght@900&family=Playfair+Display:ital,wght@1,900&family=Playwrite+NZ+Guides&family=Fira+Code:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            cursor: none;
            overflow-x: hidden;
            background-color: #f5f5f5;
            transition: background-color 0.5s ease;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .dark body {
            background-color: #0d0d0d;
        }

        @media (pointer: coarse) {
            body { cursor: auto !important; }
            .custom-cursor { display: none !important; }
        }

        .font-huge { font-family: 'Inter', sans-serif; font-weight: 900; }
        .font-marquee { font-family: 'Montserrat', sans-serif; font-weight: 900; }
        .font-serif-italic { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 700; }
        .font-mono-code { font-family: 'Fira Code', 'Consolas', 'Monaco', monospace; }
        
        .text-huge { font-size: clamp(5rem, 13vw, 17rem); line-height: 0.85; letter-spacing: -0.05em; }
        .outline-text { -webkit-text-stroke: 1px black; color: transparent; }
        .dark .outline-text { -webkit-text-stroke: 1px white; color: transparent; }
        
        .magnetic-letter {
            display: inline-block;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
            white-space: pre;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        .pause { animation-play-state: paused; }

        .crazy-transition {
            transition: background-color 0.1s linear !important;
        }

        .terminal-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .terminal-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-shake {
            animation: shake 0.5s infinite;
        }

        /* Sophisticated Slice Glitch Animation */
        @keyframes glitch-anim {
            0% { clip-path: inset(40% 0 61% 0); transform: translate(-2px, -2px); }
            10% { clip-path: inset(92% 0 1% 0); transform: translate(2px, 2px); }
            20% { clip-path: inset(25% 0 58% 0); transform: translate(-2px, 2px); }
            30% { clip-path: inset(54% 0 7% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(58% 0 43% 0); transform: translate(-2px, -2px); }
            50% { clip-path: inset(20% 0 10% 0); transform: translate(2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(-2px, 2px); }
            70% { clip-path: inset(10% 0 85% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, -2px); }
            90% { clip-path: inset(30% 0 20% 0); transform: translate(2px, 2px); }
            100% { clip-path: inset(40% 0 61% 0); transform: translate(-2px, -2px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(24% 0 29% 0); transform: translate(2px, 2px); }
            10% { clip-path: inset(54% 0 21% 0); transform: translate(-2px, -2px); }
            20% { clip-path: inset(30% 0 17% 0); transform: translate(2px, -2px); }
            30% { clip-path: inset(8% 0 71% 0); transform: translate(-2px, 2px); }
            40% { clip-path: inset(18% 0 61% 0); transform: translate(2px, 2px); }
            50% { clip-path: inset(54% 0 7% 0); transform: translate(-2px, -2px); }
            60% { clip-path: inset(24% 0 29% 0); transform: translate(2px, -2px); }
            70% { clip-path: inset(92% 0 1% 0); transform: translate(-2px, 2px); }
            80% { clip-path: inset(25% 0 58% 0); transform: translate(2px, 2px); }
            90% { clip-path: inset(54% 0 7% 0); transform: translate(-2px, -2px); }
            100% { clip-path: inset(24% 0 29% 0); transform: translate(2px, -2px); }
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: "chaos";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip-path: inset(45% 0 44% 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim-2 3s infinite linear alternate-reverse;
        }

        .is-destroyed * {
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 1.5s ease !important;
            pointer-events: none !important;
        }

        @keyframes pulse-red {
            0%, 100% { background-color: #007187; }
            50% { background-color: #871600; }
        }
        .animate-danger {
            animation: pulse-red 2s infinite;
        }

        .window-shadow {
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
        }

        .texture-overlay {
            position: fixed;
            inset: 0;
            z-index: 99999;
            pointer-events: none;
            opacity: 0.12;
            mix-blend-mode: multiply;
        }
        
        .dark .texture-overlay {
            mix-blend-mode: screen;
            opacity: 0.08;
        }

        .glass-finish {
            position: fixed;
            inset: 0;
            z-index: 99998;
            pointer-events: none;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15) 0%, transparent 70%);
            backdrop-filter: contrast(1.05);
        }

        /* Lottery Ball Animation */
        @keyframes ball-pop {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            60% { transform: scale(1.1) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .animate-ball {
            animation: ball-pop 0.4s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        /* Heart Animation */
        @keyframes heart-rise {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5) rotate(20deg); opacity: 0; }
        }
        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: heart-rise 1s ease-out forwards;
        }

        /* Global Click Ripple */
        @keyframes global-ripple {
            0% { transform: translate(-50%, -50%) scale(0.2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }
    </style>
</head>
<body class="dark:bg-[#0d0d0d] text-black dark:text-white">
    <svg style="display:none">
        <filter id="noiseFilter">
            <feTurbulence 
                type="fractalNoise" 
                baseFrequency="0.8" 
                numOctaves="2" 
                stitchTiles="stitch" />
            <feColorMatrix type="saturate" values="0" />
        </filter>
    </svg>

    <div class="texture-overlay" style="filter: url(#noiseFilter)"></div>
    <div class="glass-finish"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const ArrowUpRightIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M7 17L17 7M17 7H7M17 7V17"/>
            </svg>
        );
        const SunIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        );
        const MoonIcon = () => (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        );
        const TerminalIcon = () => (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        );

        const PopupModal = ({ id, message, onClose, position }) => {
            return (
                <div 
                    className="fixed z-[20000] bg-white/95 dark:bg-[#0d0d0d]/95 backdrop-blur-md border border-black/10 dark:border-white/10 p-5 shadow-2xl cursor-auto select-none max-w-[85vw] rounded-xl flex flex-col gap-3"
                    style={{ 
                        left: position.x, 
                        top: position.y,
                        width: '260px'
                    }}
                >
                    <div className="flex justify-between items-center border-b border-black/5 dark:border-white/5 pb-2">
                        <span className="text-[10px] font-mono text-[#871600] dark:text-red-500 uppercase tracking-widest flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                            system.error
                        </span>
                        <button onClick={() => onClose(id)} className="text-black/40 hover:text-red-500 dark:text-white/40 dark:hover:text-red-500 transition-colors">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div className="text-xs font-mono-code text-black dark:text-white leading-tight break-words py-2">
                        {message}
                    </div>
                    <div className="mt-1 flex justify-end">
                        <button onClick={() => onClose(id)} className="text-[10px] font-mono border border-black/20 dark:border-white/20 px-4 py-1.5 rounded-full hover:bg-red-500 hover:border-red-500 hover:text-white text-black dark:text-white transition-all uppercase tracking-tighter">
                            dismiss
                        </button>
                    </div>
                </div>
            );
        };

        const MagneticText = ({ text, className = "", mousePos, onMouseEnter, onMouseLeave }) => {
            const containerRef = useRef(null);
            const letters = useMemo(() => text.split('').map((char, i) => ({
                char,
                id: i,
                ref: React.createRef()
            })), [text]);

            useEffect(() => {
                letters.forEach(letter => {
                    if (!letter.ref.current) return;
                    const rect = letter.ref.current.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const dx = mousePos.x - centerX;
                    const dy = mousePos.y - centerY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const radius = 120; 
                    if (distance < radius) {
                        const power = (radius - distance) / radius;
                        const moveX = (dx / distance) * power * -50; 
                        const moveY = (dy / distance) * power * -50;
                        letter.ref.current.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;
                    } else {
                        letter.ref.current.style.transform = `translate3d(0, 0, 0)`;
                    }
                });
            }, [mousePos, letters]);

            return (
                <div ref={containerRef} className={`inline-block ${className}`} onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
                    {letters.map((letter) => (
                        <span key={letter.id} ref={letter.ref} className="magnetic-letter">
                            {letter.char === ' ' ? '\u00A0' : letter.char}
                        </span>
                    ))}
                </div>
            );
        };

        const Terminal = ({ isOpen, onClose, setDarkMode, setIsCrazy, isCrazy, handleRepair }) => {
            const [input, setInput] = useState('');
            const [history, setHistory] = useState([
                { type: 'sys', content: 'MAXVW TERMINAL v1.0.6' },
                { type: 'sys', content: 'Hold SPACEBAR to toggle.' }
            ]);
            const historyEndRef = useRef(null);

            useEffect(() => {
                historyEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [history]);

            const handleCommand = (e) => {
                if (e.key === 'Enter') {
                    const cmd = input.trim().toLowerCase();
                    const newHistory = [...history, { type: 'user', content: `> ${input}` }];
                    switch(cmd) {
                        case 'help':
                            newHistory.push({ type: 'sys', content: 'Commands: help, dark, light, crazy, repair, clear, exit, whoami' });
                            break;
                        case 'dark': setDarkMode(true); break;
                        case 'light': setDarkMode(false); break;
                        case 'crazy': setIsCrazy(!isCrazy); break;
                        case 'repair': handleRepair(); break;
                        case 'clear': setHistory([{ type: 'sys', content: 'Cleared.' }]); setInput(''); return;
                        case 'exit': onClose(); break;
                        case 'whoami': newHistory.push({ type: 'sys', content: 'A soul stuck in a digital glitch.' }); break;
                        default: newHistory.push({ type: 'error', content: `Unknown command: ${cmd}` });
                    }
                    setHistory(newHistory);
                    setInput('');
                }
            };

            if (!isOpen) return null;
            return (
                <div 
                    className="fixed inset-0 z-[10002] bg-black/80 backdrop-blur-sm flex items-center justify-center p-6 cursor-auto select-auto"
                    onClick={(e) => {
                        if (e.target === e.currentTarget) onClose();
                    }}
                >
                    <div className="w-full max-w-[320px] md:max-w-2xl bg-[#111] border border-white/20 rounded-xl overflow-hidden flex flex-col shadow-2xl h-[60vh] md:h-[50vh]">
                        <div className="bg-[#222] p-2 flex justify-between items-center border-b border-white/10">
                            <span className="ml-2 font-mono-code text-[10px] text-white/40 uppercase">Terminal</span>
                            <button onClick={onClose} className="text-white/40 hover:text-white font-mono text-[10px] px-2">EXIT</button>
                        </div>
                        <div className="flex-grow p-4 font-mono-code text-[10px] md:text-xs overflow-y-auto terminal-scroll text-white">
                            {history.map((line, i) => (
                                <div key={i} className={`mb-1 break-words ${line.type === 'error' ? 'text-red-400' : line.type === 'user' ? 'text-[#007187]' : 'text-white/60'}`}>
                                    {line.content}
                                </div>
                            ))}
                            <div ref={historyEndRef} />
                        </div>
                        <div className="p-4 pt-0 flex gap-2 items-center">
                            <span className="text-[#007187] font-bold text-[10px] md:text-xs">{'>'}</span>
                            <input type="text" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={handleCommand} className="flex-grow bg-transparent border-none outline-none text-white font-mono-code text-[10px] md:text-xs" spellCheck="false" autoComplete="off" />
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 });
            const [travelDistance, setTravelDistance] = useState(0);
            const [cursorType, setCursorType] = useState('default'); 
            const [copyStatus, setCopyStatus] = useState(false);
            const [darkMode, setDarkMode] = useState(false);
            const [uselessMessage, setUselessMessage] = useState(null);
            const [clickCount, setClickCount] = useState(0);
            const [isCrazy, setIsCrazy] = useState(false);
            const [crazyBg, setCrazyBg] = useState('');
            const [terminalOpen, setTerminalOpen] = useState(false);
            const [anxietyTime, setAnxietyTime] = useState(new Date());
            const [stressCount, setStressCount] = useState(0);
            const [isDestroyed, setIsDestroyed] = useState(false);
            const [modals, setModals] = useState([]);
            const [scrollProgress, setScrollProgress] = useState(0);
            const [markSixNumbers, setMarkSixNumbers] = useState([7, 18, 23, 29, 35, 41]);
            const [isDrawing, setIsDrawing] = useState(false);
            const [catHearts, setCatHearts] = useState([]);
            const [isIdle, setIsIdle] = useState(false);
            const [idleCatClicks, setIdleCatClicks] = useState(0);
            const [clickEffects, setClickEffects] = useState([]);

            // New States for Battery & Catch Me
            const [batteryLevel, setBatteryLevel] = useState(null);
            const [isCharging, setIsCharging] = useState(false);
            const [batterySupported, setBatterySupported] = useState(true);
            const [freeMoneyPos, setFreeMoneyPos] = useState({ x: 0, y: 0 });
            
            const cursorRef = useRef(null);
            const lastPos = useRef({ x: 0, y: 0 });
            const shakeAcc = useRef(0);
            const lastShakeTime = useRef(Date.now());

            // Battery API Effect
            useEffect(() => {
                if ('getBattery' in navigator) {
                    navigator.getBattery().then(battery => {
                        setBatteryLevel(battery.level * 100);
                        setIsCharging(battery.charging);

                        const updateBattery = () => {
                            setBatteryLevel(battery.level * 100);
                            setIsCharging(battery.charging);
                        };

                        battery.addEventListener('levelchange', updateBattery);
                        battery.addEventListener('chargingchange', updateBattery);

                        return () => {
                            battery.removeEventListener('levelchange', updateBattery);
                            battery.removeEventListener('chargingchange', updateBattery);
                        };
                    });
                } else {
                    setBatterySupported(false);
                }
            }, []);

            useEffect(() => {
                const handleScroll = () => {
                    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
                    setScrollProgress(scrolled);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    setAnxietyTime(prev => new Date(prev.getTime() + 1500));
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            useEffect(() => {
                const handleGlobalClick = (e) => {
                    const x = e.clientX;
                    const y = e.clientY;
                    if (x === undefined || y === undefined) return;
                    const id = Date.now() + Math.random();
                    setClickEffects(prev => [...prev, { id, x, y }]);
                    setTimeout(() => {
                        setClickEffects(prev => prev.filter(c => c.id !== id));
                    }, 600);
                };
                window.addEventListener('pointerdown', handleGlobalClick);
                return () => window.removeEventListener('pointerdown', handleGlobalClick);
            }, []);

            useEffect(() => {
                document.documentElement.classList.toggle('dark', darkMode);
            }, [darkMode]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && !terminalOpen && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        setTerminalOpen(true);
                    }
                    if (e.key === 'Escape') setTerminalOpen(false);
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [terminalOpen]);

            useEffect(() => {
                const handleMouseMove = (e) => {
                    const dx = e.clientX - lastPos.current.x;
                    const dy = e.clientY - lastPos.current.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const now = Date.now();
                    if (now - lastShakeTime.current < 500) {
                        shakeAcc.current += dist;
                        if (shakeAcc.current > 5000 && !isDestroyed) {
                            shakeAcc.current = 0;
                        }
                    } else { shakeAcc.current = 0; }
                    lastShakeTime.current = now;
                    if (dist < 500) setTravelDistance(prev => prev + dist);
                    lastPos.current = { x: e.clientX, y: e.clientY };
                    setMousePos({ x: e.clientX, y: e.clientY });
                    if (cursorRef.current) cursorRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0) translate(-50%, -50%)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, [isDestroyed]);

            useEffect(() => {
                if (isCrazy) {
                    const interval = setInterval(() => setCrazyBg(`hsl(${Math.random() * 360}, 70%, 50%)`), 100);
                    return () => clearInterval(interval);
                }
            }, [isCrazy]);

            useEffect(() => {
                let timeout;
                const handleActivity = () => {
                    if (isIdle) return; // Must click cat 5 times to dismiss
                    clearTimeout(timeout);
                    timeout = setTimeout(() => setIsIdle(true), 30000);
                };

                if (!isIdle) {
                    handleActivity();
                    window.addEventListener('mousemove', handleActivity);
                    window.addEventListener('keydown', handleActivity);
                    window.addEventListener('click', handleActivity);
                    window.addEventListener('scroll', handleActivity);
                }

                return () => {
                    clearTimeout(timeout);
                    window.removeEventListener('mousemove', handleActivity);
                    window.removeEventListener('keydown', handleActivity);
                    window.removeEventListener('click', handleActivity);
                    window.removeEventListener('scroll', handleActivity);
                };
            }, [isIdle]);

            const onEnterHover = () => setCursorType('hover');
            const onEnterText = () => setCursorType('text');
            const onLeave = () => setCursorType('default');

            const handleUselessClick = () => {
                setUselessMessage("this is a useless button.");
                setTimeout(() => setUselessMessage(null), 2000);
                const newCount = clickCount + 1;
                setClickCount(newCount);
                if (newCount === 5) { setIsCrazy(!isCrazy); setClickCount(0); }
            };

            const triggerModals = () => {
                const messages = ["叫咗你唔好撳㗎啦！", "點解你咁唔聽話？", "system overload detected.", "your curiosity is dangerous.", "an unexpected error has occurred.", "user.intelligence is null.", "stop clicking me.", "你仲撳？", "error: curiosity killed the cat.", "kernel panic: too much max.", "please reboot your life.", "unauthorized access to fun."];
                const count = window.innerWidth < 768 ? 8 : 15;
                for(let i=0; i < count; i++) {
                    setTimeout(() => {
                        const winWidth = window.innerWidth;
                        const winHeight = window.innerHeight;
                        const modalWidth = 260;
                        const modalHeight = 150;
                        setModals(prev => [...prev, {
                            id: Date.now() + i,
                            message: messages[Math.floor(Math.random() * messages.length)],
                            position: {
                                x: Math.max(10, Math.random() * (winWidth - modalWidth - 20)),
                                y: Math.max(10, Math.random() * (winHeight - modalHeight - 20))
                            }
                        }]);
                    }, i * 150);
                }
            };

            const drawMarkSix = () => {
                if (isDrawing) return;
                setIsDrawing(true);
                const results = [];
                while (results.length < 6) {
                    const r = Math.floor(Math.random() * 49) + 1;
                    if (!results.includes(r)) results.push(r);
                }
                setTimeout(() => {
                    setMarkSixNumbers(results.sort((a, b) => a - b));
                    setIsDrawing(false);
                }, 100);
            };

            const getBallColor = (n) => {
                const red = [1, 2, 7, 8, 12, 13, 18, 19, 23, 24, 29, 30, 34, 35, 40, 45, 46];
                const blue = [3, 4, 9, 10, 14, 15, 20, 25, 26, 31, 36, 37, 41, 42, 47, 48];
                if (red.includes(n)) return 'bg-red-500';
                if (blue.includes(n)) return 'bg-blue-500';
                return 'bg-green-500';
            };

            const handlePetCat = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const id = Date.now();
                setCatHearts(prev => [...prev, { id, x, y }]);
                setTimeout(() => {
                    setCatHearts(prev => prev.filter(h => h.id !== id));
                }, 1000);
            };

            const closePopup = (id) => setModals(prev => prev.filter(m => m.id !== id));

            const handleCopyEmail = (e) => {
                e.preventDefault();
                const email = "max@maxvw.xyz";
                const textArea = document.createElement("textarea");
                textArea.value = email;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopyStatus(true);
                    setTimeout(() => setCopyStatus(false), 2000);
                } catch (err) {}
                document.body.removeChild(textArea);
            };

            const handleRepair = () => {
                setIsDestroyed(false);
                setModals([]);
                setUselessMessage("system repaired.");
                setTimeout(() => setUselessMessage(null), 2000);
            };

            const handleIdleCatClick = () => {
                const newCount = idleCatClicks + 1;
                if (newCount >= 5) {
                    setIsIdle(false);
                    setIdleCatClicks(0);
                } else {
                    setIdleCatClicks(newCount);
                }
            };

            const handleFreeMoneyMove = (e) => {
                if (e.type === 'touchstart') e.preventDefault(); // Prevents touch scrolling/clicking instantly on mobile
                const maxX = 120;
                const maxY = 100;
                const newX = (Math.random() - 0.5) * maxX * 2;
                const newY = (Math.random() - 0.5) * maxY * 2;
                setFreeMoneyPos({ x: newX, y: newY });

            return (

                    <div className="fixed bottom-0 left-0 w-full h-[4px] z-[10005] bg-transparent overflow-hidden">

                    {isIdle && (

                    {uselessMessage && (

                            alt="Logo" className="h-8 md:h-10 invert cursor-none"

                                </div>

                        <section className="p-px bg-black/10 dark:bg-white/10 grid grid-cols-1 md:grid-cols-4 md:grid-rows-2 h-auto md:min-h-[800px] overflow-hidden">
                            <div className="bg-white/90 dark:bg-black/90 backdrop-blur-sm p-8 md:p-12 flex flex-col justify-between border-b md:border-r border-black/10 dark:border-white/10 md:col-span-2 overflow-hidden">
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest">system / anxiety.clock</div>

                                    <h3 className="text-6xl md:text-8xl font-huge tracking-tighter tabular-nums leading-none">

                                    <p className="text-sm font-mono-code mt-4 opacity-40 lowercase">time is moving 1.5x faster here. are you efficient enough?</p>
                                </div>
                                <div className="h-1 w-full bg-black/5 dark:bg-white/5 mt-8 overflow-hidden rounded-full">
                                    <div className="h-full bg-[#007187] transition-all duration-1000" style={{ width: `${(anxietyTime.getSeconds() / 60) * 100}%` }} />
                                </div>
                            </div>

                            <div 
                                className="bg-white/90 dark:bg-black/90 backdrop-blur-sm p-8 flex flex-col items-center justify-center border-b border-black/10 dark:border-white/10 cursor-none group relative active:scale-95 transition-transform overflow-hidden min-h-[300px]"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={() => setStressCount(s => s + 1)}
                            >
                                <div className="absolute top-8 left-8 text-[10px] font-mono opacity-40 uppercase tracking-widest">interactive / stress.test</div>
                                <div className={`flex items-center justify-center transition-all duration-100 ${stressCount > 10 ? 'animate-shake' : ''}`}
                                    style={{ 
                                        fontSize: stressCount > 50 ? `${Math.min(100 + (stressCount - 50) * 5, 1000)}vh` : 'clamp(5rem, 15vw, 12rem)', 
                                        lineHeight: 1 
                                    }}>
                                    {stressCount === 0 ? '😐' : stressCount < 20 ? '😰' : stressCount < 40 ? '😱' : '💀'}
                                </div>
                                <div className="mt-8 text-center absolute bottom-8">
                                    <span className="font-mono-code text-xs opacity-40 lowercase">clicks: {stressCount}</span>
                                </div>
                            </div>

                            <div 
                                className="p-8 flex flex-col justify-between border-b md:border-l border-black/10 dark:border-white/10 text-white cursor-none animate-danger hover:bg-black transition-all group overflow-hidden min-h-[200px]"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={triggerModals}
                            >
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest text-white/60">utility / panic.button</div>
                                <div className="text-4xl font-huge leading-none tracking-tighter lowercase">don't touch this.</div>
                                <div className="text-[8px] font-mono opacity-30 mt-4 leading-tight lowercase">high risk of system instability. do not interact if you value your time.</div>
                            </div>

                            <div 
                                className="bg-white/90 dark:bg-black/90 backdrop-blur-sm text-black dark:text-white p-8 flex flex-col justify-center items-center gap-4 cursor-none hover:bg-[#007187] hover:text-white dark:hover:text-white transition-colors min-h-[150px] border-b md:border-b-0 md:border-r border-black/10 dark:border-white/10"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={handleCopyEmail}
                            >
                                <div className="text-sm font-huge tracking-widest uppercase">{copyStatus ? 'copied!' : 'get in touch'}</div>
                                <div className="font-mono-code text-[10px] opacity-40 lowercase">max@maxvw.xyz</div>
                            </div>

                            <div className="bg-white/90 dark:bg-black/90 backdrop-blur-sm p-8 md:p-12 flex flex-col justify-between border-black/10 dark:border-white/10 md:col-span-3 group overflow-hidden">
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest">analytics / life.odometer</div>
                                <div className="my-8">
                                    <span className="text-xs font-mono-code opacity-40 block mb-2 uppercase text-wrap lowercase">total mouse distance (px):</span>
                                    <h3 className="text-5xl md:text-9xl font-huge tracking-tighter tabular-nums truncate">{Math.floor(travelDistance).toLocaleString()}</h3>
                                </div>
                                <div className="flex flex-wrap gap-4 font-mono text-[10px] uppercase opacity-40 lowercase">
                                    <div>calories: {(travelDistance * 0.0001).toFixed(4)}</div>
                                    <div>sanity: low</div>
                                </div>
                            </div>
                        </section>

                        <section className="px-px pb-px bg-black/10 dark:bg-white/10 grid grid-cols-1 md:grid-cols-2 overflow-hidden border-t-0">
                            {/* Mark Six Box */}
                            <div 
                                className="bg-white/95 dark:bg-black/95 backdrop-blur-md p-8 md:p-12 flex flex-col border-b md:border-r border-black/10 dark:border-white/10 min-h-[400px] group overflow-hidden"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave}
                            >
                                <div className="flex justify-between items-start mb-10">
                                    <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest">utility / marksix.draw</div>
                                    <button 
                                        onClick={drawMarkSix}
                                        className="text-[10px] font-mono border border-black/20 dark:border-white/20 px-4 py-1 rounded-full hover:bg-[#007187] hover:text-white transition-all lowercase tracking-tighter"
                                    >
                                        draw again
                                    </button>
                                </div>
                                <div className="flex-grow grid grid-cols-3 gap-4 md:gap-6 place-content-center place-items-center w-full max-w-[320px] mx-auto py-8">
                                    {markSixNumbers.map((n, i) => (
                                        <div 
                                            key={`${n}-${i}-${isDrawing}`} 
                                            className={`w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center text-white font-huge text-2xl md:text-3xl shadow-lg border-2 border-white/20 animate-ball ${getBallColor(n)}`}
                                            style={{ animationDelay: `${i * 0.1}s` }}
                                        >
                                            {n}
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-[9px] font-mono opacity-30 text-center lowercase">1 in 13,983,816 chance. good luck.</div>
                            </div>

                            {/* Pet the Cat Box */}
                            <div 
                                className="bg-white/95 dark:bg-black/95 backdrop-blur-md p-8 md:p-12 flex flex-col min-h-[400px] relative overflow-hidden group cursor-none border-b border-black/10 dark:border-white/10"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave} onClick={handlePetCat}
                            >
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest mb-4">companion / pet.the.cat</div>
                                <div className="flex-grow flex items-center justify-center relative">
                                    <div className="w-48 h-48 md:w-64 md:h-64 relative group-hover:scale-105 transition-transform duration-500">
                                        <img 
                                            src="https://raw.githubusercontent.com/MrMAXVW/maxvw.xyz/main/resources/cat.png" 
                                            alt="Black Cat" 
                                            className="w-full h-full object-contain drop-shadow-2xl pointer-events-none"
                                            draggable="false"
                                        />
                                    </div>
                                    {catHearts.map(h => (
                                        <div key={h.id} className="heart-particle text-red-500 text-3xl" style={{ left: h.x, top: h.y }}>
                                            ❤
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-4 text-center">
                                    <span className="font-mono-code text-[10px] opacity-40 lowercase">petting detected: purr...</span>
                                </div>
                            </div>

                            {/* Free Money Box (Catch Me) */}
                            <div 
                                className="bg-white/95 dark:bg-black/95 backdrop-blur-md p-8 md:p-12 flex flex-col min-h-[300px] relative overflow-hidden group border-b md:border-b-0 md:border-r border-black/10 dark:border-white/10"
                                onMouseEnter={onEnterHover} onMouseLeave={onLeave}
                            >
                                <div className="text-[10px] font-mono opacity-40 uppercase tracking-widest mb-4">interactive / free.money</div>
                                <div className="flex-grow flex items-center justify-center relative">
                                    <button 
                                        onMouseEnter={handleFreeMoneyMove}
                                        onTouchStart={handleFreeMoneyMove}
                                        onClick={handleFreeMoneyMove}

                                <div className="mt-4 text-center">
                                    <span className="font-mono-code text-[10px] opacity-40 lowercase">good luck catching that.</span>

                            <div 
                                className="bg-white/95 dark:bg-black/95 backdrop-blur-md p-8 md:p-12 flex flex-col min-h-[300px] relative overflow-hidden group cursor-none"
